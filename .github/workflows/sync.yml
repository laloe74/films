name: Sync NeoDB Films

on:
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'sync:') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync films from NeoDB (auto)
        if: ${{ github.event_name == 'schedule' }}
        env:
          NEOB_API_TOKEN: ${{ secrets.NEOB_API_TOKEN }}
        run: python scripts/sync_films.py

      - name: Sync films from NeoDB (full)
        if: ${{ github.event_name != 'schedule' }}
        env:
          NEOB_API_TOKEN: ${{ secrets.NEOB_API_TOKEN }}
          SYNC_MODE: full
        run: python scripts/sync_films.py

      - name: Commit and push if changes
        run: |
          git config user.name "film-bot"
          git config user.email "bot@films.tongmingzhi.com"
          git add content/films.toml content/_index.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: update films from NeoDB"
            git pull --rebase && git push
          fi
